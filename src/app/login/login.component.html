<div align="right" style="margin: 20px">
  @if ((user | async)?.username !== '') {
    <button [matMenuTriggerFor]="menu" color="primary" matButton="outlined">
      {{ (user | async)?.username }} : {{ (user | async)?.role }}
    </button>
    <mat-menu #menu="matMenu">
      <p>
        <button (click)="editUser()" color="primary" matButton="outlined">Change password</button>
      </p>
      <p>
        <button (click)="logout()" color="primary" matButton="outlined">
          <mat-icon>logout</mat-icon>
          logout
        </button>
      </p>
    </mat-menu>
  } @else {
    <button (click)="login()" color="primary" matButton="outlined">
      <mat-icon>login</mat-icon>
      login
    </button>
    <button (click)="addUser()" color="primary" matButton="filled">Sign Up</button>
  }
</div>
