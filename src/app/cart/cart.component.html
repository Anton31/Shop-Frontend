<div align="center">
  <h2 mat-dialog-title>{{ title }}</h2>
  <h3 mat-dialog-title>Total quantity: {{ cart.totalQuantity }} </h3>
  @if (cart.totalPrice <= 0) {
    <h3 mat-dialog-title>Cart is empty</h3>
  } @else {
    <h3 mat-dialog-title>Total price: {{ cart.totalPrice }} </h3>
  }
  <table [dataSource]="cart.items" class="mat-elevation-z8" mat-table>
    <ng-container align="center" matColumnDef="name">
      <th *matHeaderCellDef mat-header-cell>Name</th>
      <td *matCellDef="let item" mat-cell>
        @if (item.product.photos.length > 0) {
          <p>
            <img alt="no photo" src="{{item.product.photos[0].url}}"/>
          </p>
        }
        <p>{{ item.product.name }}</p>
      </td>
    </ng-container>
    <ng-container matColumnDef="actions">
      <th *matHeaderCellDef mat-header-cell> Quantity</th>
      <td *matCellDef="let item" mat-cell>
        <h3>
          <button (click)="minusItem(item.id)" color="primary" mat-icon-button>
            <mat-icon>remove</mat-icon>
          </button>
          {{ item.quantity }}
          <button (click)="plusItem(item.id)" color="primary" mat-icon-button>
            <mat-icon>add</mat-icon>
          </button>
          <button (click)="removeFromCart(item.id)" color="primary" mat-icon-button>
            <mat-icon>delete</mat-icon>
          </button>
        </h3>
      </td>
    </ng-container>
    <tr *matHeaderRowDef="displayedColumns" mat-header-row></tr>
    <tr *matRowDef="let row; columns: displayedColumns;" mat-row></tr>
  </table>
  <p></p>
  <div align="center">
    <button (click)="onNoClick()" mat-button>Return to shopping</button>
    <button (click)="checkout()" mat-flat-button>Order</button>
  </div>
</div>
