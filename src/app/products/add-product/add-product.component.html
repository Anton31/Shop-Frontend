<div class="product-container">
  <h1 mat-dialog-title>{{ title }}</h1>
  <form [formGroup]="data.productForm">
    <input formControlName="id" type="hidden"/>
    <p>
      <mat-form-field>
        <mat-label>Type</mat-label>
        <mat-select formControlName="typeId" required>
          <mat-option [value]="0">None</mat-option>
          @for (type of types; track type) {
            <mat-option [value]="type.id">{{ type.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </p>
    <p>
      <mat-form-field>
        <mat-label>Brand</mat-label>
        <mat-select formControlName="brandId" required>
          <mat-option [value]="0">None</mat-option>
          @for (brand of brands; track brand) {
            <mat-option [value]="brand.id">{{ brand.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </p>
    <p>
      <mat-form-field>
        <mat-label>Name:</mat-label>
        <input formControlName="name" matInput required>
        @if (name.hasError('required')) {
          <mat-error>Name is required</mat-error>
        }
        @if (name.hasError('minlength')) {
          <mat-error>Name must be at least 3 characters</mat-error>
        }
      </mat-form-field>
    </p>
    <p>
      <mat-form-field>
        <mat-label>Price:</mat-label>
        <input formControlName="price" matInput>
      </mat-form-field>
    </p>
  </form>
  <mat-dialog-actions>
    <button (click)="onNoClick()" matButton="outlined">No Thanks</button>
    <button [disabled]="!data.productForm.valid" [mat-dialog-close]="data.productForm.value" matButton="filled">Ok
    </button>
  </mat-dialog-actions>
</div>
