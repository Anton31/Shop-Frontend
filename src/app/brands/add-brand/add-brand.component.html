<h1 align="center">{{ title }}</h1>
<form [formGroup]="data.brandForm">
  <p align="center">
    <input formControlName="id" type="hidden">
  </p>
  <p align="center">
    <mat-form-field>
      <mat-label>Name:</mat-label>
      <input formControlName="name" matInput>
        @if (name.hasError('required')) {
          <mat-error>Name is required</mat-error>
        }
        @if (name.hasError('minlength')) {
          <mat-error>Name must be at least 3 characters</mat-error>
        }
    </mat-form-field>
  </p>
</form>
<div align="center" mat-dialog-actions>
  <button (click)="onNoClick()" matButton="outlined">No Thanks</button>
  <button [disabled]="!data.brandForm.valid" [mat-dialog-close]="data.brandForm.value" matButton="filled">Ok</button>
</div>
